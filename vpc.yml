# ============================================================
# CloudFormation Template – 3-Tier Architecture with NAT + RDS
#
# This Infrastructure Creates:
#
# 1. One VPC (10.0.0.0/16)
# 2. Internet Gateway attached to VPC
# 3. Six Subnets:
#    - 2 Public Subnets (Web Tier)
#    - 2 Private Subnets (Application Tier)
#    - 2 Private Subnets (Database Tier)
# 4. Route Tables:
#    - 1 Public Route Table (Internet Access)
#    - 1 Private Route Table (NAT Access)
# 5. NAT Gateway with Elastic IP
# 6. Security Groups:
#    - Web Security Group
#    - App Security Group
#    - RDS Security Group
# 7. EC2 Instances:
#    - Web Server (Public)
#    - Application Server (Private)
# 8. RDS MySQL Database (Single-AZ, Private)
#
# All supported resources include Name Tags.
# ============================================================

AWSTemplateFormatVersion: "2010-09-09"
Description: 3-Tier Architecture with NAT Gateway, RDS MySQL, and Public S3

Resources:

# ------------------------
# VPC
# ------------------------
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

# ------------------------
# Internet Gateway
# ------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MyInternetGateway

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

# ------------------------
# Public Subnets
# ------------------------
  WebPublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: WebPublicSubnet1

  WebPublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: WebPublicSubnet2

# ------------------------
# Private Subnets (App)
# ------------------------
  AppPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: AppPrivateSubnet1

  AppPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: AppPrivateSubnet2

# ------------------------
# Private Subnets (DB)
# ------------------------
  DBPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.5.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: DBPrivateSubnet1

  DBPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.6.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: DBPrivateSubnet2

# ------------------------
# Route Tables
# ------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

# ------------------------
# NAT Gateway
# ------------------------
  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: NatEIP

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: AttachIGW
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref WebPublicSubnet1
      Tags:
        - Key: Name
          Value: NatGateway

  PrivateRouteToNat:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

# ------------------------
# Route Table Associations
# ------------------------
  WebSubnetAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WebPublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  WebSubnetAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref WebPublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  AppSubnetAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppPrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  AppSubnetAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppPrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  DBSubnetAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DBPrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  DBSubnetAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DBPrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

# ------------------------
# Security Groups
# ------------------------
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH from Internet
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: WebSecurityGroup
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP & SSH from Web Server
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: AppSecurityGroup
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref WebSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref WebSecurityGroup

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL from App Server and My IP
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: RDSSecurityGroup
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroup
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 116.74.196.241/32

# ------------------------
# EC2 Instances
# ------------------------
  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: ami-051a31ab2f4d498f5
      SubnetId: !Ref WebPublicSubnet1
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      KeyName: awsPub
      Tags:
        - Key: Name
          Value: Web_Server

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: ami-051a31ab2f4d498f5
      SubnetId: !Ref AppPrivateSubnet1
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      KeyName: awsPub
      Tags:
        - Key: Name
          Value: App_Server

# ------------------------
# RDS Subnet Group
# ------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for MySQL RDS
      SubnetIds:
        - !Ref DBPrivateSubnet1
        - !Ref DBPrivateSubnet2
      Tags:
        - Key: Name
          Value: DBSubnetGroup

# ------------------------
# RDS Instance
# ------------------------
  StudentDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: student-database
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      DBName: studentdb
      MasterUsername: admin
      MasterUserPassword: Admin12345
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 0

 
